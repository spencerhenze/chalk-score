<ion-header>
  <ion-toolbar>
    <ion-title>Results</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div *ngIf="loading" class="ion-padding ion-text-center">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

  <ion-list *ngIf="!loading">
    <ion-item *ngFor="let session of sessions" (click)="openSession(session.id)" button detail>
      <ion-label>
        <h2>{{ session.name }}</h2>
        <p>{{ session.date | date:'mediumDate' }}</p>
      </ion-label>
      <ion-badge slot="end" [color]="session.isActive ? 'warning' : 'medium'">
        {{ session.isActive ? 'Open' : 'Closed' }}
      </ion-badge>
    </ion-item>

    <ion-item *ngIf="sessions.length === 0">
      <ion-label class="ion-text-center ion-padding">
        <p>No sessions yet. Create one in the Sessions tab.</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
