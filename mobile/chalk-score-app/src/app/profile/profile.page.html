<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/gymnasts"></ion-back-button>
    </ion-buttons>
    <ion-title>Profile</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div *ngIf="loading" class="ion-padding ion-text-center">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

  <ng-container *ngIf="profile && !loading">
    <div class="profile-header ion-padding ion-text-center">
      <ion-avatar class="profile-avatar">
        <img *ngIf="picture" [src]="picture" alt="Profile photo">
        <div *ngIf="!picture" class="avatar-placeholder">
          {{ profile.firstName[0] }}{{ profile.lastName[0] }}
        </div>
      </ion-avatar>
      <h2>{{ profile.firstName }} {{ profile.lastName }}</h2>
      <ion-badge [color]="profile.role === 'Coach' ? 'primary' : 'medium'">
        {{ profile.role }}
      </ion-badge>
    </div>

    <ion-list lines="full" class="ion-margin-top">
      <ion-item>
        <ion-label>
          <p>Email</p>
          <h3>{{ profile.email }}</h3>
        </ion-label>
      </ion-item>
      <ion-item *ngIf="profile.isAdmin">
        <ion-label>
          <p>Access</p>
          <h3>Administrator</h3>
        </ion-label>
      </ion-item>
    </ion-list>

    <div class="ion-padding ion-margin-top">
      <ion-button *ngIf="profile.isAdmin" expand="block" fill="outline" (click)="manageUsers()" class="ion-margin-bottom">
        Manage Users
      </ion-button>
      <ion-button expand="block" fill="outline" color="danger" (click)="logout()">
        Sign Out
      </ion-button>
    </div>
  </ng-container>
</ion-content>
