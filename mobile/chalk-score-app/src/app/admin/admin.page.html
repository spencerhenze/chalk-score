<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/profile"></ion-back-button>
    </ion-buttons>
    <ion-title>Manage Users</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="load()">
        <ion-icon slot="icon-only" name="refresh-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div *ngIf="loading" class="ion-padding ion-text-center">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

  <ng-container *ngIf="!loading">
    <ion-list-header>
      <ion-label>Pending Approval</ion-label>
    </ion-list-header>
    <ion-list *ngIf="pendingUsers.length > 0">
      <ion-item-sliding *ngFor="let user of pendingUsers">
        <ion-item>
          <ion-label>
            <h3>{{ user.firstName }} {{ user.lastName }}</h3>
            <p>{{ user.email }}</p>
          </ion-label>
          <ion-button slot="end" (click)="approve(user)">Approve</ion-button>
        </ion-item>
        <ion-item-options side="end">
          <ion-item-option color="danger" (click)="deleteUser(user)">
            <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    </ion-list>
    <div *ngIf="pendingUsers.length === 0" class="ion-padding ion-text-center">
      <p>No users awaiting approval.</p>
    </div>

    <ion-list-header class="ion-margin-top">
      <ion-label>Active Users</ion-label>
    </ion-list-header>
    <ion-list *ngIf="activeUsers.length > 0">
      <ion-item *ngFor="let user of activeUsers" button (click)="openUserOptions(user)">
        <ion-label>
          <h3>{{ user.firstName }} {{ user.lastName }}</h3>
          <p>{{ user.email }}</p>
          <p *ngIf="user.updatedByName">Last updated by {{ user.updatedByName }}</p>
        </ion-label>
        <ion-badge slot="end" [color]="user.role === 'Coach' ? 'primary' : 'medium'">
          {{ user.role }}
        </ion-badge>
        <ion-badge slot="end" color="warning" *ngIf="user.isAdmin" class="ion-margin-start">
          Admin
        </ion-badge>
      </ion-item>
    </ion-list>
    <div *ngIf="activeUsers.length === 0" class="ion-padding ion-text-center">
      <p>No active users.</p>
    </div>
  </ng-container>
</ion-content>
