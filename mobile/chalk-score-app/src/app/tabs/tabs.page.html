<ion-tabs>

  <ion-tab-bar slot="bottom">
    <ng-container *ngIf="!adminMode.isAdminMode">
      <ion-tab-button tab="gymnasts" href="/tabs/gymnasts">
        <ion-icon aria-hidden="true" name="people-outline"></ion-icon>
        <ion-label>Gymnasts</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="sessions" href="/tabs/sessions">
        <ion-icon aria-hidden="true" name="calendar-outline"></ion-icon>
        <ion-label>Sessions</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="results" href="/tabs/results">
        <ion-icon aria-hidden="true" name="bar-chart-outline"></ion-icon>
        <ion-label>Results</ion-label>
      </ion-tab-button>
    </ng-container>

    <ng-container *ngIf="adminMode.isAdminMode">
      <ion-tab-button tab="builder-exercises" href="/tabs/builder-exercises">
        <ion-icon aria-hidden="true" name="barbell-outline"></ion-icon>
        <ion-label>Exercises</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="builder-tests" href="/tabs/builder-tests">
        <ion-icon aria-hidden="true" name="document-text-outline"></ion-icon>
        <ion-label>Tests</ion-label>
      </ion-tab-button>
    </ng-container>
  </ion-tab-bar>

</ion-tabs>
