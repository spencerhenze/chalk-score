<ion-header>
  <ion-toolbar>
    <ion-title>Sessions</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="openCreate()">
        <ion-icon slot="icon-only" name="add-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar>
    <ion-segment [(ngModel)]="segment">
      <ion-segment-button value="open">
        <ion-label>Open ({{ open.length }})</ion-label>
      </ion-segment-button>
      <ion-segment-button value="closed">
        <ion-label>Closed ({{ closed.length }})</ion-label>
      </ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div *ngIf="loading" class="ion-padding ion-text-center">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

  <ion-list *ngIf="!loading">
    <ion-item-sliding *ngFor="let session of sessions">
      <ion-item [routerLink]="['/tabs/sessions', session.id]" button detail>
        <ion-icon
          slot="start"
          [name]="session.isActive ? 'lock-open-outline' : 'lock-closed-outline'"
          [color]="session.isActive ? 'success' : 'medium'">
        </ion-icon>
        <ion-label>
          <h2>{{ session.name }}</h2>
          <p>{{ session.date | date:'mediumDate' }} · {{ session.gymnastCount }} gymnast{{ session.gymnastCount !== 1 ? 's' : '' }}</p>
        </ion-label>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option *ngIf="session.isActive" color="warning" (click)="confirmClose(session)">
          <ion-icon slot="icon-only" name="lock-closed-outline"></ion-icon>
        </ion-item-option>
        <ion-item-option color="danger" (click)="confirmDelete(session)">
          <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>

    <ion-item *ngIf="sessions.length === 0">
      <ion-label class="ion-text-center ion-padding">
        <p>{{ segment === 'open' ? 'No open sessions. Tap + to create one.' : 'No closed sessions yet.' }}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
