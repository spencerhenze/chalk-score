<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="cancel()">Cancel</ion-button>
    </ion-buttons>
    <ion-title>Add Exercise</ion-title>
  </ion-toolbar>
  <ion-toolbar>
    <ion-searchbar placeholder="Search exercises" (ionInput)="onSearch($event)" debounce="200"></ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div *ngIf="loading" class="ion-padding ion-text-center">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

  <ion-list *ngIf="!loading" lines="full">
    <ion-item *ngFor="let ex of filtered" button (click)="select(ex)">
      <ion-label>
        <h2>{{ ex.name }}</h2>
        <p>{{ ex.measurementType }} · {{ ex.unit }}</p>
      </ion-label>
    </ion-item>

    <ion-item *ngIf="filtered.length === 0">
      <ion-label class="ion-text-center ion-padding">
        <p>No exercises found.</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
