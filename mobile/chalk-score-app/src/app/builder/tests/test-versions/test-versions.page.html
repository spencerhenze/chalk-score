<ion-header>
  <ion-toolbar color="warning">
    <ion-title>Admin Mode</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="adminMode.exit()">Exit</ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button [defaultHref]="'/tabs/builder-tests'"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ testType?.name }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="newVersion()">New Version</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div *ngIf="loading" class="ion-padding ion-text-center">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

  <ion-list *ngIf="testType && !loading" lines="full">
    <ion-item-sliding *ngFor="let v of testType.versions">
      <ion-item button detail (click)="openVersion(v)">
        <ion-label>
          <h2>{{ versionLabel(v) }}</h2>
          <p>{{ v.exerciseCount }} exercise{{ v.exerciseCount !== 1 ? 's' : '' }} · Created {{ v.createdAt | date:'mediumDate' }}</p>
        </ion-label>
        <ion-badge slot="end" [color]="badgeColor(v)">
          {{ v.isDraft ? 'Draft' : (v.isActive ? 'Active' : 'Inactive') }}
        </ion-badge>
      </ion-item>
      <ion-item-options side="end" *ngIf="v.isDraft">
        <ion-item-option color="danger" (click)="deleteVersion(v)">
          <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>
</ion-content>
