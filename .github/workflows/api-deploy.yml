name: API Deploy

on:
  push:
    branches: [develop, master]
    paths:
      - 'api/**'
      - '.github/workflows/api-deploy.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'api/ChalkScore.Api/ChalkScore.Api.csproj'
  DOCKERFILE_PATH: 'api/ChalkScore.Api'
  IMAGE_NAME: 'ghcr.io/${{ github.repository_owner }}/chalk-score-api'
  AZURE_LOCATION: 'eastus2'

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }} -r linux-x64

      - name: Install EF tools
        run: dotnet tool install --global dotnet-ef

      - name: Create migration bundle
        run: |
          dotnet ef migrations bundle \
            --project ${{ env.PROJECT_PATH }} \
            --context AppDbContext \
            --self-contained \
            --runtime linux-x64 \
            --output ./efbundle \
            --force

      - uses: actions/upload-artifact@v4
        with:
          name: migration-bundle
          path: ./efbundle

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=${{ github.ref_name }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy (${{ github.ref_name }})
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'master' && 'production' || 'dev' }}

    steps:
      - name: Set resource names
        run: |
          if [[ "${{ github.ref_name }}" == "master" ]]; then
            ENV_SLUG="prod"
            ASPNETCORE_ENV="Production"
          else
            ENV_SLUG="dev"
            ASPNETCORE_ENV="Development"
          fi
          echo "ENV_SLUG=$ENV_SLUG"                                >> $GITHUB_ENV
          echo "ASPNETCORE_ENV=$ASPNETCORE_ENV"                    >> $GITHUB_ENV
          echo "RESOURCE_GROUP=chalkscore-dev"                    >> $GITHUB_ENV
          echo "CONTAINER_ENV=chalkscore-env-dev"                 >> $GITHUB_ENV
          echo "APP_NAME=chalkscore-api-$ENV_SLUG"                >> $GITHUB_ENV
          echo "IMAGE=${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}" >> $GITHUB_ENV

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Register required providers
        run: |
          az provider register --namespace Microsoft.App --wait --output none
          az provider register --namespace Microsoft.OperationalInsights --wait --output none

      - name: Ensure resource group
        run: |
          az group create \
            --name $RESOURCE_GROUP \
            --location ${{ env.AZURE_LOCATION }} \
            --tags environment=$ENV_SLUG project=chalkscore \
            --output none

      - name: Download migration bundle
        uses: actions/download-artifact@v4
        with:
          name: migration-bundle
          path: ./

      - name: Run migrations
        run: |
          NPGSQL=$(python3 -c "import os,urllib.parse as p; u=p.urlparse(os.environ['DATABASE_URL']); print(f'Host={u.hostname};Database={u.path[1:]};Username={p.unquote(u.username)};Password={p.unquote(u.password)};SslMode=Require',end='')")
          chmod +x ./efbundle
          ./efbundle --connection "$NPGSQL"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Ensure Container Apps environment
        run: |
          if ! az containerapp env show --name $CONTAINER_ENV --resource-group $RESOURCE_GROUP &>/dev/null; then
            az containerapp env create \
              --name $CONTAINER_ENV \
              --resource-group $RESOURCE_GROUP \
              --location ${{ env.AZURE_LOCATION }} \
              --output none
          fi

      - name: Deploy Container App
        run: |
          NPGSQL=$(python3 -c "import os,urllib.parse as p; u=p.urlparse(os.environ['DATABASE_URL']); print(f'Host={u.hostname};Database={u.path[1:]};Username={p.unquote(u.username)};Password={p.unquote(u.password)};SslMode=Require',end='')")

          FEEDBACK_NPGSQL=$(python3 -c "import os,urllib.parse as p; u=p.urlparse(os.environ['FEEDBACK_DATABASE_URL']); print(f'Host={u.hostname};Database={u.path[1:]};Username={p.unquote(u.username)};Password={p.unquote(u.password)};SslMode=Require',end='')")

          if az containerapp show --name $APP_NAME --resource-group $RESOURCE_GROUP &>/dev/null; then
            az containerapp update \
              --name $APP_NAME \
              --resource-group $RESOURCE_GROUP \
              --image $IMAGE \
              --set-env-vars \
                "App__Environment=$ENV_SLUG" \
                "ConnectionStrings__DefaultConnection=$NPGSQL" \
                "ConnectionStrings__FeedbackDbConnection=$FEEDBACK_NPGSQL" \
                "Auth0__Domain=${{ secrets.AUTH0_DOMAIN }}" \
                "Auth0__Audience=${{ secrets.AUTH0_AUDIENCE }}" \
                "Auth0__ManagementClientId=${{ secrets.AUTH0_MANAGEMENT_CLIENT_ID }}" \
                "Auth0__ManagementClientSecret=${{ secrets.AUTH0_MANAGEMENT_CLIENT_SECRET }}" \
                "Auth0__StaffRoleId=${{ secrets.AUTH0_STAFF_ROLE_ID }}" \
                "Auth0__CoachRoleId=${{ secrets.AUTH0_COACH_ROLE_ID }}" \
              --output none
          else
            az containerapp create \
              --name $APP_NAME \
              --resource-group $RESOURCE_GROUP \
              --environment $CONTAINER_ENV \
              --image $IMAGE \
              --target-port 8080 \
              --ingress external \
              --min-replicas 1 \
              --max-replicas 1 \
              --registry-server ghcr.io \
              --registry-username ${{ github.repository_owner }} \
              --registry-password "${{ secrets.GHCR_TOKEN }}" \
              --env-vars \
                "App__Environment=$ENV_SLUG" \
                "ConnectionStrings__DefaultConnection=$NPGSQL" \
                "ConnectionStrings__FeedbackDbConnection=$FEEDBACK_NPGSQL" \
                "Auth0__Domain=${{ secrets.AUTH0_DOMAIN }}" \
                "Auth0__Audience=${{ secrets.AUTH0_AUDIENCE }}" \
                "Auth0__ManagementClientId=${{ secrets.AUTH0_MANAGEMENT_CLIENT_ID }}" \
                "Auth0__ManagementClientSecret=${{ secrets.AUTH0_MANAGEMENT_CLIENT_SECRET }}" \
                "Auth0__StaffRoleId=${{ secrets.AUTH0_STAFF_ROLE_ID }}" \
                "Auth0__CoachRoleId=${{ secrets.AUTH0_COACH_ROLE_ID }}" \
              --output none
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FEEDBACK_DATABASE_URL: ${{ secrets.FEEDBACK_DATABASE_URL }}
