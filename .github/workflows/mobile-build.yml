name: Mobile Build Check

on:
  push:
    branches: [develop, release, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-build.yml'
  pull_request:
    paths:
      - 'mobile/**'

defaults:
  run:
    working-directory: mobile/chalk-score-app

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/chalk-score-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx ng build --configuration production
