name: Mobile Build Check

on:
  push:
    branches: [develop, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-build.yml'
  pull_request:
    paths:
      - 'mobile/**'

defaults:
  run:
    working-directory: mobile/chalk-score-app

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: mobile/chalk-score-app/package-lock.json

      - name: Remove platform-specific lockfile entries
        run: |
          node -e "
          const fs = require('fs');
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          Object.keys(lock.packages).forEach(k => {
            if (/darwin|win32|linux-arm|linux-musl/.test(k)) delete lock.packages[k];
          });
          fs.writeFileSync('package-lock.json', JSON.stringify(lock));
          "

      - name: Install dependencies
        run: npm install --omit=optional

      - name: Build
        run: npx ng build --configuration production
