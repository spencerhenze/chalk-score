name: Mobile Build Check

on:
  push:
    branches: [develop, release, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-build.yml'
  pull_request:
    paths:
      - 'mobile/**'

defaults:
  run:
    working-directory: mobile/chalk-score-app

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: mobile/chalk-score-app/package-lock.json

      - name: Print npm version
        run: npm --version

      - name: Install dependencies
        id: npm-install
        run: npm install --omit=optional
        continue-on-error: true

      - name: Print npm debug log on failure
        if: steps.npm-install.outcome == 'failure'
        run: cat ~/.npm/_logs/*.log | head -100

      - name: Fail if install failed
        if: steps.npm-install.outcome == 'failure'
        run: exit 1

      - name: Build
        run: npx ng build --configuration production
